<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Next Watch Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header class="hero">
        <h1>Anime Next Watch Generator</h1>
        <p class="subtitle">
            Discover trending anime instantly. Search by title and pick your
            next watch.
        </p>
    </header>

    <main class="app-shell">
        <section class="controls" aria-label="Anime controls">
            <div class="control-group">
                <label for="searchInput">Search Title</label>
                <input id="searchInput" type="text" placeholder="Try: One Piece" />
            </div>

            <button id="refreshBtn" type="button">Refresh List</button>
        </section>

        <section id="status" class="status" aria-live="polite"></section>

        <section id="animeGrid" class="anime-grid" aria-label="Anime list"></section>
    </main>

    <template id="animeCardTemplate">
        <article class="anime-card">
            <img class="poster" alt="Anime poster" loading="lazy" />
            <div class="card-content">
                <h2 class="title"></h2>
                <div class="meta-row">
                    <span class="score-pill">N/A</span>
                    <span class="episodes"></span>
                    <span class="year"></span>
                </div>
                <p class="genres"></p>
                <details class="synopsis-block">
                    <summary>Synopsis</summary>
                    <p class="synopsis"></p>
                </details>
                <a class="details-link" target="_blank" rel="noopener noreferrer">View on MyAnimeList</a>
            </div>
        </article>
    </template>

    <script src="script.js"></script>
</body>

</html>
